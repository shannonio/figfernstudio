    <path d="M84 42C150 102 175 183 162 292" fill="none" stroke="#173128" stroke-opacity="0.38" stroke-width="6" stroke-linecap="round"/>
    <path d="M111 124C143 136 162 155 182 189" fill="none" stroke="#173128" stroke-opacity="0.24" stroke-width="4" stroke-linecap="round"/>
