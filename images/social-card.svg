<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Fig and Fern Software Studio social sharing card</title>
  <desc id="desc">A branded social sharing image with botanical shapes, the Fig and Fern name, and a software studio tagline.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10281f"/>
      <stop offset="52%" stop-color="#214235"/>
      <stop offset="100%" stop-color="#526e4a"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dce6d6"/>
      <stop offset="100%" stop-color="#a7be99"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f4efe4" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#f4efe4" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0c1d17" flood-opacity="0.28"/>
